name: Pharma News Agent

on:
  schedule:
    # Daglig agent: kl. 07:00 norsk tid (06:00 UTC) mandag–fredag
    - cron: "0 6 * * 1-5"
    # Ukesdigest: fredag kl. 08:00 norsk tid (07:00 UTC)
    - cron: "0 7 * * 5"
  workflow_dispatch:
    inputs:
      run_digest:
        description: 'Kjør ukesdigest manuelt'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør daglig nyhetsagent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: python main.py

      - name: Kjør ukesdigest (kun fredag eller manuelt)
        if: github.event.schedule == '0 7 * * 5' || github.event.inputs.run_digest == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: python weekly_digest.py
