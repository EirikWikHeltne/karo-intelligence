name: Pharma News Agent

on:
  schedule:
    # Kjører kl. 07:00 norsk tid (06:00 UTC) hver ukedag
    - cron: "0 6 * * 1-5"
  workflow_dispatch:  # Manuell kjøring fra GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_EMAIL:  ${{ secrets.NEWSLETTER_EMAIL }}
          NEWSLETTER_SENDER: ${{ secrets.NEWSLETTER_SENDER }}
        run: python main.py
